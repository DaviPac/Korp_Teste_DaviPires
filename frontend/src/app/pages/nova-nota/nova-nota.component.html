<h2>Nova Nota Fiscal</h2>

<mat-card style="max-width: 500px; margin-bottom: 24px">
  <mat-card-header>
    <mat-card-title>Adicionar Produto</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="itemForm" (ngSubmit)="adicionarItem()"
      style="display:flex; flex-direction:column; gap:12px; margin-top:16px">

      <mat-form-field>
        <mat-label>Código do Produto</mat-label>
        <input matInput formControlName="codigo" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Quantidade</mat-label>
        <input matInput type="number" formControlName="quantidade" />
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="itemForm.invalid">
        <mat-icon>add</mat-icon> Adicionar
      </button>
    </form>
  </mat-card-content>
</mat-card>

<table mat-table [dataSource]="itens" style="width: 100%; margin-bottom: 24px"
  *ngIf="itens.length > 0">

  <ng-container matColumnDef="codigo">
    <th mat-header-cell *matHeaderCellDef>Código</th>
    <td mat-cell *matCellDef="let i">{{ i.codigo }}</td>
  </ng-container>

  <ng-container matColumnDef="quantidade">
    <th mat-header-cell *matHeaderCellDef>Quantidade</th>
    <td mat-cell *matCellDef="let i">{{ i.quantidade }}</td>
  </ng-container>

  <ng-container matColumnDef="remover">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let i">
      <button mat-icon-button color="warn" (click)="removerItem(i.codigo)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="colunas"></tr>
  <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
</table>

<div style="display:flex; gap: 12px">
  <button mat-button routerLink="/notas">Cancelar</button>
  <button mat-raised-button color="primary" (click)="salvar()" [disabled]="itens.length === 0">
    Salvar Nota
  </button>
</div>
