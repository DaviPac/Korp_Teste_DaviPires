<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px">
  <h2 style="margin: 0">Notas Fiscais</h2>
  <button mat-raised-button color="primary" routerLink="/notas/nova">
    + Nova Nota
  </button>
</div>

<table mat-table [dataSource]="notas" style="width: 100%">

  <ng-container matColumnDef="numero">
    <th mat-header-cell *matHeaderCellDef>Número</th>
    <td mat-cell *matCellDef="let n">{{ n.numero }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let n">
      <mat-chip [color]="n.status === 'Aberta' ? 'primary' : 'warn'" highlighted>
        {{ n.status }}
      </mat-chip>
    </td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let n">
      <button
        mat-raised-button
        color="accent"
        [disabled]="n.status !== 'Aberta' || imprimindo === n.id"
        (click)="imprimir(n)">

        <mat-spinner
          *ngIf="imprimindo === n.id"
          diameter="18"
          style="display:inline-block; margin-right: 8px">
        </mat-spinner>

        <mat-icon *ngIf="imprimindo !== n.id">print</mat-icon>
        {{ imprimindo === n.id ? 'Imprimindo...' : 'Imprimir' }}
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="colunas"></tr>
  <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
</table>
