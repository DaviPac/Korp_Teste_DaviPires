<div class="page-header">
  <h1 class="page-title">Produtos</h1>
  <p class="page-sub">Gerencie seu catálogo de produtos</p>
</div>

<div class="layout">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>Novo produto</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="salvar()">
        <mat-form-field appearance="fill">
          <mat-label>Código</mat-label>
          <input matInput formControlName="codigo" placeholder="Ex: CANETA-001" />
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Descrição</mat-label>
          <input matInput formControlName="descricao" placeholder="Nome do produto" />
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Saldo inicial</mat-label>
          <input matInput type="number" formControlName="saldo" />
        </mat-form-field>

        <button mat-raised-button class="btn-dark" type="submit" [disabled]="form.invalid">
          Salvar produto
        </button>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-header class="produtos-title">
      <mat-card-title>Produtos cadastrados</mat-card-title>
      <mat-chip-set>
        <mat-chip>{{ produtos.length }}</mat-chip>
      </mat-chip-set>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="produtos">
        <ng-container matColumnDef="codigo">
          <th mat-header-cell *matHeaderCellDef>Código</th>
          <td mat-cell *matCellDef="let p" class="mono">{{ p.codigo }}</td>
        </ng-container>

        <ng-container matColumnDef="descricao">
          <th mat-header-cell *matHeaderCellDef>Descrição</th>
          <td mat-cell *matCellDef="let p">{{ p.descricao }}</td>
        </ng-container>

        <ng-container matColumnDef="saldo">
          <th mat-header-cell *matHeaderCellDef class="right">Saldo</th>
          <td mat-cell *matCellDef="let p" class="right">
            <mat-chip [class.chip-low]="p.saldo <= 5" [class.chip-ok]="p.saldo > 5">
              {{ p.saldo }}
            </mat-chip>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colunas"></tr>
        <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
      </table>

      @if (produtos.length === 0) {
        <p class="empty">Nenhum produto cadastrado.</p>
      }
    </mat-card-content>
  </mat-card>
</div>
