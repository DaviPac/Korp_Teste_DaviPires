<mat-card style="max-width: 500px; margin-bottom: 32px">
  <mat-card-header>
    <mat-card-title>Cadastrar Produto</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="salvar()" style="display:flex; flex-direction:column; gap:12px; margin-top:16px">
      <mat-form-field>
        <mat-label>Código</mat-label>
        <input matInput formControlName="codigo" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Descrição</mat-label>
        <input matInput formControlName="descricao" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Saldo</mat-label>
        <input matInput type="number" formControlName="saldo" />
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Salvar
      </button>
    </form>
  </mat-card-content>
</mat-card>

<h2>Produtos Cadastrados</h2>

<table mat-table [dataSource]="produtos" style="width: 100%">
  <ng-container matColumnDef="codigo">
    <th mat-header-cell *matHeaderCellDef>Código</th>
    <td mat-cell *matCellDef="let p">{{ p.codigo }}</td>
  </ng-container>

  <ng-container matColumnDef="descricao">
    <th mat-header-cell *matHeaderCellDef>Descrição</th>
    <td mat-cell *matCellDef="let p">{{ p.descricao }}</td>
  </ng-container>

  <ng-container matColumnDef="saldo">
    <th mat-header-cell *matHeaderCellDef>Saldo</th>
    <td mat-cell *matCellDef="let p">{{ p.saldo }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="colunas"></tr>
  <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
</table>
